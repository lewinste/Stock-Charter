<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1e2c"/>
      <stop offset="100%" stop-color="#2a3040"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2962ff"/>
      <stop offset="100%" stop-color="#00c853"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Upward chart line / pulse -->
  <polyline
    points="10,44 20,38 28,42 36,28 44,32 52,16"
    fill="none"
    stroke="url(#line)"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Glow dot at the end -->
  <circle cx="52" cy="16" r="4" fill="#00c853" opacity="0.9"/>
  <circle cx="52" cy="16" r="7" fill="#00c853" opacity="0.2"/>
  <!-- Subtle baseline -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5"/>
</svg>
